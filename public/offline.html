<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRC Reporting - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(165deg, #f2f7f5 0%, #e6f1ec 100%);
        color: #10382f;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(560px, 92vw);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #c8ddd5;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(16, 56, 47, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        CRC Reporting could not load this page because your internet connection is unavailable.
        Reconnect and refresh to continue.
      </p>
    </main>
  </body>
</html>
